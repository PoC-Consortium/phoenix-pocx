name: Android Release

on:
  workflow_dispatch:  # Manual trigger only, no inputs needed

permissions:
  contents: write

jobs:
  build-android:
    name: Build & Sign Android APK (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Three Android build flavors from one codebase. Each disables one
        # cargo feature; the appId differs so all three can coexist / upload
        # side by side. Only the `wallet` flavor is the Play Store candidate
        # (no mining code compiled in); `mining` is a sideload pure-miner;
        # `hybrid` keeps the existing appId so current sideload installs update.
        #
        # build_args: passed to `tauri android build`. `-f <feature>` is
        # honored by the CLI and reaches cargo. It is ADDITIVE and cargo's
        # default features are EMPTY (see Cargo.toml), so `-f wallet` yields
        # EXACTLY `[wallet]` — no `--no-default-features` needed (and there is
        # no such flag on `tauri android build`; its `-- <args>` go to Gradle,
        # not cargo). Hybrid names both features explicitly.
        # app_name is the Android launcher label, patched into strings.xml
        # per flavor so the three installs are distinguishable on the home
        # screen. Desktop keeps "Phoenix Wallet" (tauri.conf.json productName).
        include:
          - flavor: hybrid
            app_id: org.pocx.phoenix
            app_name: "Phoenix Suite"
            build_args: "-f mining -f wallet"
          - flavor: wallet   # Play Store candidate — NO mining compiled in
            app_id: org.pocx.phoenix.wallet
            app_name: "Phoenix Wallet"
            build_args: "-f wallet"
          - flavor: mining   # sideload pure miner — NO wallet compiled in
            app_id: org.pocx.phoenix.miner
            app_name: "Phoenix Miner"
            build_args: "-f mining"
    steps:
      - uses: actions/checkout@v4

      - name: Get latest release tag
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName -q '.[0].tagName')
          if [ -z "$TAG" ]; then
            echo "No release found!"
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Found latest release: $TAG"

      - name: Compute version identity
        id: version
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="${TAG#v}"
          # versionCode scheme: MAJOR*10000 + MINOR*100 + PATCH (e.g. 2.2.0 -> 20200)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}
          CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          if [ "$CODE" -lt 1 ]; then CODE=1; fi
          echo "name=$VERSION" >> $GITHUB_OUTPUT
          echo "code=$CODE" >> $GITHUB_OUTPUT
          echo "versionName=$VERSION versionCode=$CODE"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk/25* /usr/local/lib/android/sdk/ndk/26* /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web-wallet/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;27.0.11718014"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.11718014" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './web-wallet/src-tauri -> target'
          key: ${{ matrix.flavor }}

      - name: Install web-wallet dependencies
        working-directory: web-wallet
        run: npm ci

      - name: Initialize Android project
        working-directory: web-wallet
        run: npx tauri android init

      - name: Set Android app icon
        run: |
          # Copy pre-generated icons to Android res folder
          cp -r web-wallet/src-tauri/android-icons/* web-wallet/src-tauri/gen/android/app/src/main/res/

      - name: Configure AndroidManifest.xml
        run: |
          MANIFEST="web-wallet/src-tauri/gen/android/app/src/main/AndroidManifest.xml"

          # Add tools namespace for lint suppression
          sed -i 's|<manifest |<manifest xmlns:tools="http://schemas.android.com/tools" |' "$MANIFEST"

          # Add permissions: storage access + WiFi lock for mining
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" tools:ignore="ScopedStorage" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.CHANGE_WIFI_STATE" />' "$MANIFEST"

          # Add requestLegacyExternalStorage to application tag
          sed -i 's|<application|<application android:requestLegacyExternalStorage="true"|' "$MANIFEST"

          # Wallet app: the seed lives in app data — keep it out of Google
          # Auto-Backup and device-to-device migration (Android defaults
          # allowBackup to true when unset). dataExtractionRules additionally
          # covers the Android 12+ (API 31+) device-transfer path that
          # allowBackup alone does not.
          sed -i 's|<application|<application android:allowBackup="false" android:dataExtractionRules="@xml/data_extraction_rules" tools:replace="android:allowBackup"|' "$MANIFEST"

          # Add Samsung DeX meta-data for better process survival on Samsung devices
          sed -i '/<\/application>/i\        <meta-data android:name="com.samsung.android.keepalive.density" android:value="true" />\n        <meta-data android:name="com.samsung.android.multidisplay.keep_process_alive" android:value="true" />\n        <meta-data android:name="com.sec.android.support.multiwindow" android:value="true" />' "$MANIFEST"

          # Ship the data-extraction rules the manifest now references:
          # exclude every app file from BOTH cloud-backup and device-transfer
          # (Android 12+). Copied from the in-repo template so the rules stay
          # reviewable — the same template-copy pattern as build.gradle.kts.
          RES_XML="web-wallet/src-tauri/gen/android/app/src/main/res/xml"
          mkdir -p "$RES_XML"
          cp web-wallet/src-tauri/android-template/data_extraction_rules.xml \
             "$RES_XML/data_extraction_rules.xml"

          echo "Modified manifest:"
          cat "$MANIFEST"

          # Build assertions: a tauri/template change must NEVER silently
          # reship backups. Fail the build if any backup guard is missing.
          grep -q 'allowBackup="false"' "$MANIFEST" || { echo "allowBackup patch missing"; exit 1; }
          grep -q 'android:dataExtractionRules="@xml/data_extraction_rules"' "$MANIFEST" || { echo "dataExtractionRules patch missing"; exit 1; }
          test -f "$RES_XML/data_extraction_rules.xml" || { echo "data_extraction_rules.xml missing"; exit 1; }

      - name: Setup Android signing
        run: |
          # Decode keystore from secret
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > $HOME/release.keystore

          # Replace generated build.gradle.kts with our signing-enabled template.
          # The template reads PHX_APP_ID / PHX_VERSION_NAME / PHX_VERSION_CODE
          # from the environment (set on the build step) for per-flavor identity.
          cp web-wallet/src-tauri/android-template/build.gradle.kts \
             web-wallet/src-tauri/gen/android/app/build.gradle.kts

          # Create keystore.properties (CI only provides secrets, signing logic is in template)
          cat > web-wallet/src-tauri/gen/android/keystore.properties <<EOF
          storeFile=$HOME/release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Set Android launcher label — ${{ matrix.flavor }}
        env:
          PHX_APP_NAME: ${{ matrix.app_name }}
        run: |
          # Patch the generated strings.xml so the launcher label (the manifest
          # uses android:label="@string/app_name") matches the flavor. Runs
          # after `tauri android init` (which generates strings.xml) and the
          # build.gradle.kts template copy. Guarded: fail loudly if the file or
          # the app_name line is missing, so we notice rather than silently
          # shipping the wrong label.
          STRINGS="web-wallet/src-tauri/gen/android/app/src/main/res/values/strings.xml"
          test -f "$STRINGS" || { echo "ERROR: $STRINGS not found (did tauri android init run?)"; exit 1; }
          grep -q '<string name="app_name">' "$STRINGS" || { echo "ERROR: app_name string not found in $STRINGS"; exit 1; }
          sed -i "s#<string name=\"app_name\">[^<]*</string>#<string name=\"app_name\">${PHX_APP_NAME}</string>#" "$STRINGS"
          echo "Set launcher label to: ${PHX_APP_NAME}"
          grep '<string name="app_name">' "$STRINGS"
          # Re-assert the new label actually landed.
          grep -q "<string name=\"app_name\">${PHX_APP_NAME}</string>" "$STRINGS" || { echo "ERROR: app_name patch did not apply"; exit 1; }

      - name: Build Android APK (ARM64 only) — ${{ matrix.flavor }}
        working-directory: web-wallet
        env:
          PHX_APP_ID: ${{ matrix.app_id }}
          PHX_APP_NAME: ${{ matrix.app_name }}
          PHX_VERSION_NAME: ${{ steps.version.outputs.name }}
          PHX_VERSION_CODE: ${{ steps.version.outputs.code }}
        run: npx tauri android build --target aarch64 ${{ matrix.build_args }}

      - name: Verify signed APK exists
        id: verify
        run: |
          # Find release APK (must be signed, not unsigned)
          APK_FILE=$(find web-wallet/src-tauri/gen/android -name "*.apk" -type f | grep -v debug | grep -v unsigned | head -1)

          if [ -z "$APK_FILE" ]; then
            echo "ERROR: No signed release APK found!"
            echo "Available APKs:"
            find web-wallet/src-tauri/gen/android -name "*.apk" -type f
            exit 1
          fi

          echo "Found signed APK: $APK_FILE"
          echo "apk_path=$APK_FILE" >> $GITHUB_OUTPUT

      - name: Upload to latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="${{ steps.version.outputs.name }}"
          APK_FILE="${{ steps.verify.outputs.apk_path }}"

          # Per-flavor asset name so the three uploads never clobber each other.
          NEW_NAME="Phoenix-PoCX-${VERSION}-Android-${{ matrix.flavor }}-ARM64.apk"
          cp "$APK_FILE" "$NEW_NAME"

          echo "Uploading $NEW_NAME to release $TAG"
          gh release upload "$TAG" "$NEW_NAME" --repo ${{ github.repository }} --clobber

          echo "Successfully uploaded Android APK ($NEW_NAME) to $TAG"
