name: iOS Build (Test)

# Unsigned SIMULATOR build — proves the whole stack (Angular + Rust +
# Xcode project) compiles for iOS and produces a bootable .app, with NO
# Apple Developer account or signing secrets. Device/TestFlight builds
# need the org-enrolled Apple account (see docs/IOS-HANDOFF.md) and will
# be a separate ios-release workflow with certificate secrets.

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  build-ios:
    name: Build iOS Simulator app (unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web-wallet/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './web-wallet/src-tauri -> target'

      - name: Install web-wallet dependencies
        working-directory: web-wallet
        run: npm ci

      - name: Initialize iOS project
        working-directory: web-wallet
        run: npx tauri ios init

      - name: Set iOS app icon
        run: |
          # Copy pre-generated icons into the asset catalog (init writes Tauri defaults)
          cp web-wallet/src-tauri/ios-icons/*.png web-wallet/src-tauri/gen/apple/Assets.xcassets/AppIcon.appiconset/

      - name: Build for iOS Simulator (unsigned)
        working-directory: web-wallet
        # The Tauri CLI must drive the build (it starts a build server the
        # Xcode "Build Rust Code" phase talks to — invoking xcodebuild
        # directly fails with a missing *-server-addr file). A simulator
        # target needs no signing. iOS is always the wallet-only flavor
        # (default features are empty; `-f wallet` compiles the nodeless
        # wallet and leaves the mining stack out, like the Play wallet app).
        run: npx tauri ios build --debug --target aarch64-sim -f wallet

      - name: Locate simulator .app
        id: find-app
        run: |
          APP_DIR=$(find "web-wallet/src-tauri/gen/apple/build/arm64-sim" -maxdepth 1 -name "*.app" -type d | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "ERROR: No .app produced"
            find web-wallet/src-tauri/gen/apple/build -maxdepth 3 || true
            exit 1
          fi
          echo "Found app: $APP_DIR"
          echo "app_path=$APP_DIR" >> $GITHUB_OUTPUT

      - name: Upload simulator app as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Phoenix-Wallet-iOS-Simulator-test
          path: ${{ steps.find-app.outputs.app_path }}
          retention-days: 14
