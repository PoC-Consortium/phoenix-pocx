name: Staple Notarization

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Source: "release" to download from a GitHub release, "artifact" to download from a workflow run'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - artifact
      tag:
        description: 'Release tag (e.g. v2.0.0-rc13). Only for source=release. Leave empty for latest.'
        required: false
        type: string
      run_id:
        description: 'Workflow run ID. Only for source=artifact. Leave empty for latest desktop-build-test run.'
        required: false
        type: string

permissions:
  contents: write
  actions: read

jobs:
  staple:
    name: Staple (${{ matrix.label }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_name: AppleSilicon
            label: macOS-AppleSilicon
          - arch_name: Intel
            label: macOS-Intel

    steps:
      - name: Download DMG from release
        if: inputs.source == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName --jq '.[0].tagName')
          fi
          VERSION="${TAG#v}"
          DMG_NAME="Phoenix-PoCX-Wallet-${VERSION}-macOS-${{ matrix.arch_name }}.dmg"

          gh release download "$TAG" \
            --repo ${{ github.repository }} \
            --pattern "$DMG_NAME" \
            --dir .

          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV
          echo "UPLOAD_TAG=$TAG" >> $GITHUB_ENV

      - name: Download DMG from artifact
        if: inputs.source == 'artifact'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.run_id }}" ]; then
            RUN_ID="${{ inputs.run_id }}"
          else
            RUN_ID=$(gh run list --repo ${{ github.repository }} --workflow "desktop-build-test.yml" --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          fi

          ARTIFACT_NAME="Phoenix-PoCX-Wallet-${{ matrix.label }}-test"
          echo "Downloading artifact $ARTIFACT_NAME from run $RUN_ID..."

          gh run download "$RUN_ID" \
            --repo ${{ github.repository }} \
            --name "$ARTIFACT_NAME" \
            --dir .

          DMG_NAME=$(ls *.dmg)
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Submit for notarization and wait
        id: notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        timeout-minutes: 120
        run: |
          echo "Submitting $DMG_NAME for notarization..."
          OUTPUT=$(xcrun notarytool submit "$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 2h 2>&1) || true
          echo "$OUTPUT"

          # Extract submission ID
          SUB_ID=$(echo "$OUTPUT" | grep "id:" | head -1 | awk '{print $2}')
          echo "submission_id=$SUB_ID" >> $GITHUB_OUTPUT

          # Fetch detailed log
          echo ""
          echo "=== Notarization Log ==="
          xcrun notarytool log "$SUB_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" || true

          # Check if it was accepted
          if echo "$OUTPUT" | grep -q "status: Accepted"; then
            echo "Notarization accepted!"
          else
            echo "Notarization failed — see log above"
            exit 1
          fi

      - name: Staple notarization ticket
        run: |
          echo "Stapling notarization ticket to $DMG_NAME..."
          xcrun stapler staple "$DMG_NAME"
          echo "Verifying staple..."
          xcrun stapler validate "$DMG_NAME"

      - name: Re-upload stapled DMG to release
        if: inputs.source == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$UPLOAD_TAG" "$DMG_NAME" \
            --repo ${{ github.repository }} \
            --clobber

      - name: Upload stapled DMG as artifact
        if: inputs.source == 'artifact'
        uses: actions/upload-artifact@v4
        with:
          name: Phoenix-PoCX-Wallet-${{ matrix.label }}-notarized
          path: ${{ env.DMG_NAME }}
          retention-days: 14
